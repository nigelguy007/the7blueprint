<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="60%">
      <stop offset="0%"   stop-color="#1a0d00"/>
      <stop offset="60%"  stop-color="#000000"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <linearGradient id="ig" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%"   stop-color="#ff8c00"/>
      <stop offset="50%"  stop-color="#ffcc66"/>
      <stop offset="100%" stop-color="#ff8c00"/>
    </linearGradient>
    <filter id="g" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b1"/>
      <feGaussianBlur stdDeviation="14" result="b2" in="SourceGraphic"/>
      <feMerge>
        <feMergeNode in="b2"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="title" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#999999"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Logo, scaled and centered horizontally, near top -->
  <g transform="translate(440, 110) scale(1.6)">
    <path d="M 100 50 C 130 18 170 18 170 50 C 170 82 130 82 100 50 C 70 18 30 18 30 50 C 30 82 70 82 100 50 Z"
          stroke="#ff8c00" stroke-width="14" fill="none" stroke-linecap="round" opacity="0.55" filter="url(#g)"/>
    <path d="M 100 50 C 130 18 170 18 170 50 C 170 82 130 82 100 50 C 70 18 30 18 30 50 C 30 82 70 82 100 50 Z"
          stroke="url(#ig)" stroke-width="9" fill="none" stroke-linecap="round"/>
    <path d="M 100 50 C 130 18 170 18 170 50 C 170 82 130 82 100 50 C 70 18 30 18 30 50 C 30 82 70 82 100 50 Z"
          stroke="#fff8e7" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.9"/>
  </g>

  <!-- Brand wordmark -->
  <text x="600" y="370" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', Helvetica, sans-serif"
        font-size="34" font-weight="600" fill="#ff8c00" letter-spacing="0.5">
    mobiusinfinity007
  </text>

  <!-- Headline -->
  <text x="600" y="445" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', Helvetica, sans-serif"
        font-size="58" font-weight="700" fill="url(#title)" letter-spacing="-2">
    Discover the way you're wired to build.
  </text>

  <!-- Subhead -->
  <text x="600" y="500" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', Helvetica, sans-serif"
        font-size="26" font-weight="400" fill="#a1a1a6" letter-spacing="-0.3">
    A 3-minute assessment. Seven dimensions. One blueprint.
  </text>

  <!-- Bottom mark -->
  <text x="600" y="580" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', Helvetica, sans-serif"
        font-size="18" font-weight="500" fill="#86868b" letter-spacing="2">
    THE7BLUEPRINT.COM
  </text>
</svg>
